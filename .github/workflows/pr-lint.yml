name: PR Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  check-pr-title:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if ! echo "$TITLE" | grep -qE '^(feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert)(\(.+\))?: .{1,}$'; then
            echo "PR title must follow conventional commits format:"
            echo "  feat|fix|chore|docs|refactor|test|ci|perf|style|build|revert(<scope>): <description>"
            echo "Got: $TITLE"
            exit 1
          fi
