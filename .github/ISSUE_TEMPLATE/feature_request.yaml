name: Feature request
description: Propose an enhancement for valkey-operator
title: "ENHANCEMENT: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow, limitation, or risk should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true before this issue can be closed?
      placeholder: |
        - ...
        - ...
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
